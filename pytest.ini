[pytest]
testpaths = api_tests ui_tests
addopts = -v --tb=short --html=reports/report.html --self-contained-html --alluredir=reports/allure-results
markers =
    smoke: 冒烟测试
    regression: 回归测试
    api: 接口测试
    ui: UI测试
    order: 订单模块
    pay: 支付模块
    cart: 购物车模块
    product: 商品模块
    user: 用户模块
